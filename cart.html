<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | BookWanderer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === DYNAMIC THEME VARIABLES (SYNCED) === */
        :root {
            --bg-overlay: rgba(31, 20, 18, 0.85); 
            --bg-panel: rgba(42, 28, 26, 0.9); 
            --bg-header: rgba(31, 20, 18, 0.98);
            --card-bg: rgba(42, 28, 26, 0.6);
            --accent-main: #d4af37; 
            --accent-sec: #c17f59; 
            --text-main: #f4ebd8; 
            --text-muted: #e0d0c1;
            --text-inverse: #1f1412;
            --border: rgba(193, 127, 89, 0.3); 
            --theme-bg-image: url('https://images.unsplash.com/photo-1568667256549-094345857637?q=80&w=2000&auto=format&fit=crop');
        }

        [data-theme="pink"] {
            --bg-overlay: rgba(18, 18, 20, 0.80); 
            --bg-panel: rgba(30, 25, 30, 0.85); 
            --bg-header: rgba(15, 15, 18, 0.95);
            --card-bg: rgba(25, 20, 25, 0.6);
            --accent-main: #ff47a3; 
            --text-main: #ffffff; 
            --border: rgba(255, 71, 163, 0.3); 
            --theme-bg-image: url('https://images.unsplash.com/photo-1618220179428-22790b46a0eb?q=80&w=2000&auto=format&fit=crop');
        }

        [data-theme="pastel"] {
            --bg-overlay: linear-gradient(135deg, rgba(255, 175, 204, 0.75), rgba(162, 210, 255, 0.75)); 
            --bg-panel: rgba(255, 255, 255, 0.6); 
            --bg-header: rgba(255, 255, 255, 0.90);
            --card-bg: rgba(255, 255, 255, 0.5);
            --accent-main: #8a5aeb; 
            --text-main: #2b2533; 
            --border: rgba(255, 175, 204, 0.6); 
            --theme-bg-image: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=2000&auto=format&fit=crop');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { 
            background-image: var(--theme-bg-image); background-size: cover; background-position: center; background-attachment: fixed;
            font-family: 'Inter', sans-serif; color: var(--text-main); overflow-x: hidden; position: relative;
        }
        body::before { content: ''; position: fixed; inset: 0; background: var(--bg-overlay); z-index: -1; backdrop-filter: blur(4px); }
        #dust-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.15; }

        header { position: sticky; top: 0; z-index: 1000; background: var(--bg-header); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        .header-main { padding: 15px 4%; display: flex; align-items: center; justify-content: space-between; }
        .brand { font-family: 'Cinzel'; font-size: 1.6rem; text-decoration: none; color: var(--text-main); }
        .brand span { color: var(--accent-main); }
        
        .nav-icons { display: flex; gap: 25px; align-items: center; }
        .icon-item { color: var(--text-muted); display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; text-decoration: none; transition: 0.3s; }
        .icon-item i { font-size: 1.1rem; color: var(--text-main); margin-bottom: 3px; }

        .checkout-container { max-width: 800px; margin: 60px auto; padding: 40px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; backdrop-filter: blur(15px); position: relative; z-index: 2; }
        .back-link { color: var(--accent-main); text-decoration: none; display: inline-block; margin-bottom: 20px; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .total-section { margin-top: 30px; text-align: right; font-size: 1.8rem; font-family: 'Cinzel'; color: var(--accent-main); }
        
        .checkout-btn { width: 100%; padding: 20px; background: var(--accent-main); color: var(--text-inverse); border: none; border-radius: 50px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 30px; letter-spacing: 1px; }

        /* Login Required Area */
        .login-prompt-box { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--accent-sec); border-radius: 8px; 
            padding: 25px; text-align: center; margin-top: 30px; display: none;
        }
        .login-prompt-box p { margin-bottom: 15px; color: var(--text-muted); }
        .btn-auth-link { background: var(--accent-main); color: var(--text-inverse); padding: 12px 30px; border-radius: 30px; text-decoration: none; font-weight: 700; display: inline-block; text-transform: uppercase; font-size: 0.9rem;}

        #payment-gate { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 2000; }
        .payment-box { background: #fff; color: #333; padding: 40px; border-radius: 12px; width: 420px; }
        .payment-box h2 { font-family: 'Cinzel'; text-align: center; margin-bottom: 20px; color: #1a1010;}
        .payment-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn-confirm { background: #27ae60; color: white; border: none; width: 100%; padding: 16px; border-radius: 30px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>
    <canvas id="dust-canvas"></canvas>
    <header>
        <div class="header-main">
            <a href="index.html" class="brand">Book<span>Wanderer</span></a>
            <div class="nav-icons">
                <a href="index.html" class="icon-item"><i class="fas fa-home"></i><span>Home</span></a>
                <a href="checkout.html" class="icon-item active"><i class="fas fa-shopping-bag"></i><span id="cart-count">Cart (0)</span></a>
                <a href="login.html" class="icon-item" id="auth-btn"><i class="fas fa-user"></i><span>Login</span></a>
            </div>
        </div>
    </header>

    <div class="checkout-container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Return to Archives</a>
        <h1 style="font-family: 'Cinzel'; border-bottom: 2px solid var(--border); padding-bottom: 15px;">Your Selection</h1>
        
        <div id="cart-display"></div>
        <div class="total-section" id="cart-total">Total: ₹ 0</div>

        <div id="checkout-action-area">
            <button id="final-checkout-btn" class="checkout-btn" onclick="openPayment()">Initiate Transaction</button>
            
            <div id="login-required-msg" class="login-prompt-box">
                <p><i class="fas fa-lock"></i> Authentication required to finalize purchase.</p>
                <a href="login.html" class="btn-auth-link">Sign In to Continue</a>
            </div>
        </div>
    </div>

    <div id="payment-gate">
        <div class="payment-box">
            <h2>Imperial Secure Pay</h2>
            <p style="text-align:center;">Payable: <strong id="pay-amount">₹ 0</strong></p>
            <input type="text" placeholder="Cardholder Name">
            <input type="text" placeholder="Card Number" maxlength="16">
            <div style="display: flex; gap: 10px;">
                <input type="text" placeholder="MM/YY" style="flex:1"><input type="password" placeholder="CVV" style="flex:1" maxlength="3">
            </div>
            <button class="btn-confirm" onclick="finalizeTransaction()">Confirm Payment</button>
            <button style="width:100%; margin-top:10px; background:none; border:none; color:#e74c3c; cursor:pointer;" onclick="document.getElementById('payment-gate').style.display='none'">Cancel</button>
        </div>
    </div>

    <script>
        let currentTotal = 0;

        // === THEME ENGINE ===
        function loadTheme() {
            const theme = localStorage.getItem('bookwanderer_theme') || 'default';
            if (theme !== 'default') document.documentElement.setAttribute('data-theme', theme);
        }
        loadTheme();

        // === USER AUTH & ACTION SYNC ===
        function checkUserStatus() {
            const userData = localStorage.getItem('user');
            const authBtn = document.getElementById('auth-btn');
            const checkoutBtn = document.getElementById('final-checkout-btn');
            const loginMsg = document.getElementById('login-required-msg');

            if (userData) {
                const user = JSON.parse(userData);
                authBtn.href = (user.email === 'book.wanderer13@gmail.com') ? "admin.html" : "account.html";
                authBtn.innerHTML = `<i class="fas fa-user-circle"></i><span>Account</span>`;
                
                checkoutBtn.style.display = 'block';
                loginMsg.style.display = 'none';
            } else {
                checkoutBtn.style.display = 'none';
                loginMsg.style.display = 'block';
            }
        }

        // === STRICT CART RENDER ===
        function renderCart() {
            const display = document.getElementById('cart-display');
            const countEl = document.getElementById('cart-count');
            const cartData = localStorage.getItem('cart');
            
            if (!cartData || cartData === "undefined" || cartData === "null" || cartData === "[]") {
                display.innerHTML = `<p style="text-align:center; padding: 40px; opacity: 0.6; font-style: italic;">The cart is empty.</p>`;
                if(countEl) countEl.innerText = "Cart (0)";
                return;
            }

            try {
                const cart = JSON.parse(cartData);
                let total = 0;
                display.innerHTML = cart.map(item => {
                    const price = parseFloat(item.price) || 0;
                    total += price;
                    return `<div class="cart-item"><span><i class="fas fa-bookmark"></i> ${item.title}</span><strong>₹ ${price}</strong></div>`;
                }).join('');

                currentTotal = total;
                document.getElementById('cart-total').innerText = `Total: ₹ ${total}`;
                document.getElementById('pay-amount').innerText = `₹ ${total}`;
                if(countEl) countEl.innerText = `Cart (${cart.length})`;
            } catch(e) { if(countEl) countEl.innerText = "Cart (0)"; }
        }

        function openPayment() {
            const cartData = localStorage.getItem('cart');
            if (!cartData || cartData === "[]") return alert("Empty cart.");
            document.getElementById('payment-gate').style.display = 'flex';
        }

        async function finalizeTransaction() {
            const userData = JSON.parse(localStorage.getItem('user'));
            const orderData = { user_email: userData.email, total_amount: currentTotal, items: JSON.parse(localStorage.getItem('cart')) };
            try {
                const res = await fetch('https://bookwanderer-api.onrender.com/orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(orderData) });
                if (res.ok) { localStorage.removeItem('cart'); window.location.href = 'success.html'; }
            } catch (e) { alert("Transaction failed."); }
        }

        function initDust() {
            const canvas = document.getElementById('dust-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const particles = [];
            for(let i=0; i<70; i++) { particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, radius: Math.random()*2+0.5, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4, alpha: Math.random()*0.5+0.2 }); }
            function animate() {
                requestAnimationFrame(animate); ctx.clearRect(0,0,canvas.width,canvas.height);
                const theme = document.documentElement.getAttribute('data-theme');
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x<0 || p.x>canvas.width) p.vx*=-1; if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    if (theme === 'pink') ctx.fillStyle = `rgba(255, 133, 194, ${p.alpha})`;
                    else if (theme === 'pastel') ctx.fillStyle = `rgba(162, 210, 255, ${p.alpha})`;
                    else ctx.fillStyle = `rgba(212, 175, 55, ${p.alpha})`;
                    ctx.fill();
                });
            }
            animate();
        }

        window.onload = () => { initDust(); renderCart(); checkUserStatus(); };
    </script>
</body>
</html>
