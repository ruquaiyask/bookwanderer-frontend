<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Access | BookWanderer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* All your existing styles stay exactly the same */
        :root { --bg-overlay: rgba(31, 20, 18, 0.80); --bg-panel: rgba(42, 28, 26, 0.85); --accent-main: #d4af37; --text-main: #f4ebd8; --border: rgba(193, 127, 89, 0.3); --theme-bg-image: url('https://images.unsplash.com/photo-1568667256549-094345857637?q=80&w=2000&auto=format&fit=crop'); }
        body { background-image: var(--theme-bg-image); background-size: cover; background-attachment: fixed; font-family: 'Inter', sans-serif; color: var(--text-main); position: relative; min-height: 100vh; display: flex; flex-direction: column; }
        body::before { content: ''; position: fixed; inset: 0; background: var(--bg-overlay); z-index: -1; backdrop-filter: blur(4px); }
        header { background: rgba(31, 20, 18, 0.95); padding: 15px 4%; border-bottom: 1px solid var(--border); }
        .brand { font-family: 'Cinzel'; font-size: 1.6rem; text-decoration: none; color: var(--text-main); }
        .brand span { color: var(--accent-main); }
        .auth-container { background: rgba(42, 28, 26, 0.6); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 450px; margin: auto; backdrop-filter: blur(15px); overflow: hidden; }
        .auth-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .auth-tab { flex: 1; text-align: center; padding: 20px; cursor: pointer; color: #e0d0c1; transition: 0.3s; }
        .auth-tab.active { color: var(--accent-main); border-bottom: 2px solid var(--accent-main); font-weight: 700; }
        .auth-body { padding: 40px; }
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: var(--accent-main); text-transform: uppercase; }
        .form-control { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 6px; color: white; outline: none; }
        .btn-submit { width: 100%; padding: 15px; background: var(--accent-main); color: #1f1412; border: none; border-radius: 30px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .forgot-link { display: block; text-align: center; margin-top: 15px; font-size: 0.85rem; color: var(--accent-main); cursor: pointer; text-decoration: underline; }
        .hidden { display: none !important; }
        .error-msg { color: #ff4c4c; font-size: 0.8rem; margin-top: 5px; }
        footer { padding: 20px; text-align: center; font-size: 0.8rem; color: #e0d0c1; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <header><a href="index.html" class="brand">Book<span>Wanderer</span></a></header>

    <div class="auth-container">
        <div class="auth-tabs" id="auth-tabs">
            <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
            <div class="auth-tab" onclick="switchTab('register')">Register</div>
        </div>

        <div class="auth-body">
            <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
                <h2 style="text-align:center; margin-bottom:20px;">Welcome <span>Back</span></h2>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
                <span class="forgot-link" onclick="switchTab('forgot')">Forgot Password?</span>
            </form>

            <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                 <h2 style="text-align:center; margin-bottom:20px;">Join <span>Library</span></h2>
                 <button type="submit" class="btn-submit">Register</button>
            </form>

            <form id="forgot-form" class="auth-form" onsubmit="handleForgotPassword(event)">
                <h2 style="text-align:center; margin-bottom:10px;">Reset <span>Password</span></h2>
                <p style="text-align:center; font-size:0.8rem; margin-bottom:20px;">We will send a code to verify your identity.</p>
                
                <div id="forgot-step-1">
                    <div class="input-group">
                        <label>Registered Email</label>
                        <input type="email" id="forgotEmail" class="form-control" required>
                    </div>
                    <button type="button" class="btn-submit" onclick="sendResetOTP()">Send Verification Code</button>
                </div>

                <div id="forgot-step-2" class="hidden">
                    <div class="input-group">
                        <label style="color: #4caf50;">Enter 6-Digit Code</label>
                        <input type="text" id="forgotOTP" class="form-control" maxlength="6">
                    </div>
                    <div class="input-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" class="form-control">
                    </div>
                    <button type="submit" class="btn-submit">Update Password</button>
                </div>
                <span class="forgot-link" onclick="switchTab('login')">Back to Login</span>
            </form>
        </div>
    </div>

    <footer>&copy; 2026 BookWanderer</footer>

    <script>
        const API_URL = "https://bookwanderer-api.onrender.com";

        function switchTab(tab) {
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('auth-tabs').classList.remove('hidden');

            if(tab === 'login') {
                document.getElementById('login-form').classList.add('active');
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
            } else if(tab === 'register') {
                document.getElementById('register-form').classList.add('active');
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
            } else if(tab === 'forgot') {
                document.getElementById('forgot-form').classList.add('active');
                document.getElementById('auth-tabs').classList.add('hidden');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.token);
                    window.location.href = (email === 'book.wanderer13@gmail.com') ? 'admin.html' : 'index.html';
                } else { alert(data.error); }
            } catch(e) { alert("Server Error"); }
        }

        // --- FORGOT PASSWORD LOGIC ---
        async function sendResetOTP() {
            const email = document.getElementById('forgotEmail').value;
            if(!email) return alert("Enter email first");
            
            try {
                const res = await fetch(`${API_URL}/send-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email })
                });
                if(res.ok) {
                    document.getElementById('forgot-step-1').classList.add('hidden');
                    document.getElementById('forgot-step-2').classList.remove('hidden');
                    alert("Verification code sent to your email!");
                } else { alert("User not found or error sending mail."); }
            } catch(e) { alert("Connection Error"); }
        }

        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            const otp = document.getElementById('forgotOTP').value;
            const password = document.getElementById('newPassword').value;

            try {
                const res = await fetch(`${API_URL}/reset-password`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, otp, newPassword: password })
                });
                if(res.ok) {
                    alert("Password updated! Please login with your new credentials.");
                    switchTab('login');
                } else { alert("Invalid code or reset failed."); }
            } catch(e) { alert("Error updating password."); }
        }
    </script>
</body>
</html>
